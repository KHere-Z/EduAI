server:
  port: 8080

spring:
  application:
    name: eduai-server
  profiles:
    active: dev

  # 数据库配置（开发环境）
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/eduai?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai
    username: root
    password: root

  # JPA 配置
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    open-in-view: false

  # Redis 配置
  data:
    redis:
      host: localhost
      port: 6379

# Sa-Token 认证配置
sa-token:
  token-name: Authorization
  timeout: 604800        # 7天
  active-timeout: -1
  is-concurrent: true
  is-share: true
  token-style: tik
  is-log: false

# Knife4j API 文档
knife4j:
  enable: true
  setting:
    language: zh_cn

# 日志
logging:
  level:
    com.eduai: debug
    org.springframework: warn
